name: verify-public-kit

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify signed release artifacts
        run: python releases/v1.0.1/verify_public_release.py --artifact-dir releases/v1.0.1 --openssl openssl
      - name: Verify MCP server metadata JSON
        run: python -m json.tool mcp-bridge/server.json > /dev/null
