name: publish-oci

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/nublos-9192/9192-public
          tags: |
            type=raw,value=v1.0.5
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.probe
          push: true
          tags: ghcr.io/nublos-9192/9192-public-probe:v1.0.5,ghcr.io/nublos-9192/9192-public-probe:latest
